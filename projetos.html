<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projetos | OM3RATE</title><link rel="stylesheet" href="app/globals.css"><style>body{margin:0;background:var(--paper);color:var(--ink)}.page{max-width:1180px;margin:auto;padding:35px 24px 90px}.back{color:var(--ink);font:700 15px var(--font-mono);text-decoration:none}.head{margin:45px 0 35px;border-bottom:1px solid var(--line);padding-bottom:30px}.head span{color:var(--brass);font:700 15px var(--font-mono);text-transform:uppercase}.head h1{font:400 clamp(42px,7vw,78px)/.95 var(--font-serif);letter-spacing:-.05em;margin:15px 0}.head p{font:400 20px/1.65 var(--font-serif);max-width:720px}.steps{display:grid;grid-template-columns:1fr 1.4fr;gap:22px}.panel{background:var(--bone);border:1px solid var(--line);padding:28px}.panel-label{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:15px}.panel-label span{color:var(--brass);font:700 14px var(--font-mono)}.panel-label strong{font:700 16px var(--font-mono)}.years,.classes{display:grid;gap:14px;margin-top:24px}.year-card,.class-card{border:1px solid var(--line);background:transparent;color:var(--ink);padding:20px;text-align:left;text-decoration:none;transition:.25s}.year-card:hover,.year-card.active,.class-card:hover{background:var(--ink);color:var(--bone);transform:translateY(-5px)}.year-card b{font:400 52px var(--font-serif)}.year-card small,.class-card small{display:block;font:700 13px var(--font-mono);margin-bottom:8px;color:var(--brass)}.class-card strong{display:block;font:400 30px var(--font-serif);margin-bottom:8px}.class-card p{font-size:17px;line-height:1.6;margin:0}.empty{color:#666;font-size:17px;line-height:1.6}@media(max-width:760px){.steps{grid-template-columns:1fr}}</style></head><body><main class="page"><a class="back" href="index.html#arquivo">← Voltar para o mapa</a><header class="head"><span>Mapa de projetos</span><h1 id="title">Projetos</h1><p>Escolha o ano e depois a turma. Cada turma abre uma página própria, com espaço para registros, fotos, materiais e produções.</p></header><section class="steps"><aside class="panel"><div class="panel-label"><span>ETAPA 02</span><strong>ANO</strong></div><div class="years" id="years"></div></aside><section class="panel"><div class="panel-label"><span>ETAPA 03</span><strong>TURMAS</strong></div><div class="classes" id="classes"></div></section></section></main><script>const database={matematica:{name:'Matemática',years:{2026:[{code:'1b',label:'1ºB',title:'Resolução de Problemas',text:'Água, gráficos e vídeos curtos para transformar dados em argumento.'}]}},fisica:{name:'Física e Tecnociência',years:{2026:[{code:'2b-fisica',label:'2ºB',title:'Feira de Acessibilidade e Movimento',text:'Projetos assistivos envolvendo movimento, forças, energia e soluções reais.'}]}},robotica:{name:'Robótica',years:{2026:[{code:'2b-robotica',label:'2ºB',title:'Feira de Acessibilidade e Movimento',text:'Protótipos, componentes, programação e autoria dos estudantes.'}]}},digital:{name:'Educação Digital',years:{2025:[{code:'7s-digital',label:'7ºs',title:'Projetos não anunciados',text:'Registros preservados enquanto os projetos permanecem protegidos.'}],2026:[{code:'1b-digital',label:'1ºB',title:'Educação Digital',text:'Programação e pensamento computacional.'},{code:'2b-digital',label:'2ºB',title:'Educação Digital',text:'Tecnologia e projetos em construção.'}]}}};const params=new URLSearchParams(location.search);const subject=params.get('materia')||'matematica';const item=database[subject]||database.matematica;document.querySelector('#title').textContent=item.name;const years=Object.keys(item.years).sort().reverse();const year=params.get('ano')&&item.years[params.get('ano')]?params.get('ano'):years[0];document.querySelector('#years').innerHTML=years.map(y=>`<a class="year-card ${y===year?'active':''}" href="projetos.html?materia=${subject}&ano=${y}"><small>abrir ano</small><b>${y}</b></a>`).join('');const list=item.years[year]||[];document.querySelector('#classes').innerHTML=list.length?list.map(c=>`<a class="class-card" href="turma.html?materia=${subject}&ano=${year}&turma=${c.code}"><small>${year}</small><strong>${c.label}</strong><p>${c.title}</p></a>`).join(''):'<p class="empty">Nenhuma turma cadastrada neste ano.</p>';</script></body></html>
