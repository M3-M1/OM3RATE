name: Publicar OM3RATE no GitHub Pages

# Prévia pública atualizada automaticamente a cada alteração na branch principal.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Separar somente os arquivos públicos
        run: |
          mkdir -p _site/app _site/public
          cp index.html _site/index.html
          cp app/globals.css _site/app/globals.css
          cp public/favicon.svg _site/public/favicon.svg
          cp public/robot-astrolabe.webp _site/public/robot-astrolabe.webp

      - name: Preparar o site HTML
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
